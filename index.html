<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f6f4;
  --surface:#fff;
  --border:#e8e4de;
  --border-light:#f0ece6;
  --text-primary:#1a1a18;
  --text-secondary:#7a7670;
  --text-muted:#b0aca5;
  --gold:#b8975a;
  --gold-dark:#9a7d46;
  --gold-light:#e8d9be;
  --gold-subtle:#f5efe4;
  --red-bg:#fee2e2;
  --red:#dc2626;
  --shadow-sm:0 1px 4px rgba(0,0,0,.05);
  --shadow-md:0 4px 24px rgba(0,0,0,.07);
  --radius:14px;
  --tr:.22s cubic-bezier(.4,0,.2,1);
}

html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.site-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.94);border-bottom:1px solid var(--border);backdrop-filter:blur(14px);padding:0 32px}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:70px;gap:28px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:22px;letter-spacing:.02em}
.brand-sep{color:var(--gold-light);font-weight:300}
.brand-date{font-size:11px;color:var(--text-muted);letter-spacing:.09em;text-transform:uppercase}
.progress-wrap{flex:1;max-width:300px}
.progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.progress-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.progress-pct{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold)}
.progress-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold),#d4aa6a);border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1);width:0%}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;padding:40px 32px 0}

/* ── SECTION ── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:14px;overflow:hidden;transition:box-shadow var(--tr),border-color var(--tr)}
.section:hover{box-shadow:var(--shadow-md);border-color:var(--gold-light)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:17px 24px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:border-color var(--tr),background var(--tr)}
.section-header:hover{background:var(--gold-subtle)}
.section.open .section-header{border-bottom-color:var(--border-light)}
.section-left{display:flex;align-items:center;gap:13px}
.section-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.section-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:16.5px;letter-spacing:.015em}
.section-count{font-size:10.5px;color:var(--text-muted);background:var(--gold-subtle);border:1px solid var(--gold-light);border-radius:20px;padding:2px 9px;font-weight:500}
.section-chevron{width:16px;height:16px;color:var(--text-muted);transition:transform var(--tr);flex-shrink:0}
.section.open .section-chevron{transform:rotate(180deg)}
.task-list{display:none}
.section.open .task-list{display:block;animation:slideDown .2s ease}

@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* ── TASK ITEM ── */
.task-item{border-bottom:1px solid var(--border-light);transition:background var(--tr);animation:fadeIn .25s ease both}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:var(--gold-subtle)}
.task-item.completed{opacity:.48}
.task-main{display:flex;align-items:center;gap:13px;padding:11px 24px}

/* ── CHECKBOX ── */
.task-checkbox{width:17px;height:17px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:border-color var(--tr),background var(--tr),transform .15s ease}
.task-item:hover .task-checkbox{border-color:var(--gold)}
.task-checkbox.checked{background:var(--gold);border-color:var(--gold);transform:scale(.95)}
.task-checkbox svg{opacity:0;transition:opacity .15s ease}
.task-checkbox.checked svg{opacity:1}

/* ── TEXT ── */
.task-text{flex:1;font-size:13.5px;font-weight:400;color:var(--text-primary);cursor:pointer;line-height:1.4;transition:color var(--tr)}
.task-item.completed .task-text{text-decoration:line-through;color:var(--text-muted)}
.task-edit-input{flex:1;border:none;border-bottom:1.5px solid var(--gold);background:transparent;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text-primary);outline:none;padding:2px 4px;caret-color:var(--gold)}

/* ── ACTION BUTTONS ── */
.task-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity var(--tr)}
.task-item:hover .task-actions{opacity:1}
.task-btn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background var(--tr),color var(--tr);flex-shrink:0}
.task-btn:hover{background:var(--gold-subtle);color:var(--gold)}
.task-btn.danger:hover{background:var(--red-bg);color:var(--red)}
.task-btn.active{color:var(--gold)}

/* ── EXPAND PANEL ── */
.task-expand{display:none;flex-direction:column;gap:12px;padding:4px 24px 14px 54px}
.task-item.expanded .task-expand{display:flex;animation:slideDown .18s ease}

/* ── NOTE ── */
.expand-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.task-note{font-size:12.5px;color:var(--text-secondary);font-style:italic;line-height:1.55;cursor:text;border-bottom:1px dashed transparent;transition:border-color var(--tr);padding:1px 2px;outline:none;border-radius:2px;min-height:20px}
.task-note:empty::before{content:attr(data-placeholder);color:var(--text-muted)}
.task-note:focus{border-bottom-color:var(--gold)}

/* ── SUBTASKS ── */
.subtask-list{display:flex;flex-direction:column}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 2px;border-bottom:1px solid var(--border-light)}
.subtask-item:last-child{border-bottom:none}
.sub-cb{width:13px;height:13px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.sub-cb.checked{background:var(--gold);border-color:var(--gold)}
.sub-cb svg{opacity:0;transition:opacity .15s}
.sub-cb.checked svg{opacity:1}
.sub-text{flex:1;font-size:12.5px;color:var(--text-secondary);outline:none;cursor:text;border-radius:2px}
.sub-text.done{text-decoration:line-through;color:var(--text-muted)}
.sub-del{width:18px;height:18px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:0;transition:opacity var(--tr),background var(--tr),color var(--tr);flex-shrink:0}
.subtask-item:hover .sub-del{opacity:1}
.sub-del:hover{background:var(--red-bg);color:var(--red)}
.add-sub-row{display:flex;align-items:center;gap:7px;margin-top:5px}
.add-sub-input{flex:1;border:none;border-bottom:1px dashed var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--text-secondary);outline:none;padding:3px 0;transition:border-color var(--tr)}
.add-sub-input::placeholder{color:var(--text-muted);font-style:italic}
.add-sub-input:focus{border-bottom-color:var(--gold)}
.add-sub-btn{width:20px;height:20px;border-radius:5px;border:1px solid var(--gold-light);background:var(--gold-subtle);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);transition:all var(--tr);flex-shrink:0}
.add-sub-btn:hover{background:var(--gold);border-color:var(--gold);color:#fff}

/* ── ADD TASK ROW ── */
.add-task-row{display:flex;align-items:center;gap:10px;padding:10px 24px 13px}
.add-task-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-secondary);outline:none;padding:5px 0;border-bottom:1px dashed var(--border);transition:border-color var(--tr),color var(--tr)}
.add-task-input::placeholder{color:var(--text-muted);font-style:italic}
.add-task-input:focus{border-bottom-color:var(--gold);color:var(--text-primary)}
.add-task-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--gold-light);background:var(--gold-subtle);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);transition:all var(--tr);flex-shrink:0}
.add-task-btn:hover{background:var(--gold);border-color:var(--gold);color:#fff;transform:scale(1.05)}

/* ── COMPLETED SECTION ── */
.completed-section{margin-top:32px}
.completed-header{display:flex;align-items:center;gap:12px;padding:0 4px 14px;cursor:pointer;user-select:none}
.completed-label{font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap}
.completed-line{flex:1;height:1px;background:var(--border)}
.completed-toggle{font-size:10px;color:var(--text-muted);transition:color var(--tr);white-space:nowrap}
.completed-header:hover .completed-toggle,.completed-header:hover .completed-label{color:var(--gold)}
.completed-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.completed-empty{padding:28px 24px;text-align:center;font-size:12px;color:var(--text-muted);font-style:italic}

/* ── FOOTER / LOGO ── */
.site-footer{margin-top:64px;padding:52px 32px 60px;display:flex;flex-direction:column;align-items:center;border-top:1px solid var(--border)}
.kc-logo{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:.8;transition:opacity var(--tr);text-decoration:none}
.kc-logo:hover{opacity:1}
.kc-monogram{width:180px;height:auto;filter:sepia(1) saturate(0.9) hue-rotate(3deg) brightness(0.88)}
.kc-wordmark{display:none}
.kc-name{display:none}
.kc-sub{display:none}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.removing{animation:fadeOut .26s ease forwards !important;pointer-events:none}
@keyframes fadeOut{to{opacity:0;transform:translateX(10px);max-height:0;padding:0;border:none}}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .header-inner{flex-wrap:wrap;height:auto;padding:14px 0;gap:10px}
  .progress-wrap{max-width:100%;width:100%}
  .main{padding:24px 16px 0}
  .site-header{padding:0 16px}
  .site-footer{padding:40px 16px 48px}
  .task-main{padding:10px 16px}
  .task-expand{padding-left:40px;padding-right:16px}
  .section-header{padding:15px 18px}
  .add-task-row{padding:9px 16px 12px}
}
</style>
</head>

  ]},

// ── FIREBASE SYNC ─────────────────────────────────────
const FB_URL = 'https://daily-ops-8b7df-default-rtdb.firebaseio.com/state.json';

function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    loading: { text:'⟳ Loading…',  color:'var(--text-muted)' },
    saving:  { text:'⟳ Saving…',   color:'var(--gold)' },
    saved:   { text:'✓ Synced',     color:'#6dbb8a' },
    error:   { text:'✕ Sync error', color:'#dc2626' },
  };
  const s = map[status] || map.saved;
  el.textContent = s.text;
  el.style.color = s.color;
}

async function loadFromFirebase() {
  setSyncStatus('loading');
  try {
    const r = await fetch(FB_URL);
    if (!r.ok) throw new Error('Load failed: ' + r.status);
    const data = await r.json();
    if (data && data.sections) {
      setSyncStatus('saved');
      return data;
    }
  } catch(e) {
    console.error('Firebase load error:', e);
    setSyncStatus('error');
  }
  setSyncStatus('saved');
  return null;
}

let saveTimer = null;
function save() {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const r = await fetch(FB_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      if (!r.ok) throw new Error('Save failed: ' + r.status);
      setSyncStatus('saved');
    } catch(e) {
      console.error('Firebase save error:', e);
      setSyncStatus('error');
    }
  }, 1000);
}

// ── STATE ─────────────────────────────────────────────
function defaultTask(id, text) {
  return { id, text, done:false, note:'', subtasks:[], expanded:false };
}
function buildDefault() {
  const st = { sections:{} };
  SECTIONS_DATA.forEach(sec => {
    st.sections[sec.id] = {
      open: true,
      tasks: sec.tasks.map((t,i) => defaultTask(sec.id+'_'+i, t))
    };
  });
  return st;
}

let state = buildDefault();

function migrateState(s) {
  Object.values(s.sections).forEach(sec => sec.tasks.forEach(t => {
    if (!t.subtasks) t.subtasks = [];
    if (t.note === undefined) t.note = '';
    if (t.expanded === undefined) t.expanded = false;
  }));
  return s;
}



// ── DATE ──────────────────────────────────────────────
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

// ── PROGRESS ──────────────────────────────────────────
function updateProgress() {
  let total=0, done=0;
  Object.values(state.sections).forEach(s => s.tasks.forEach(t => { total++; if(t.done) done++; }));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';
}

// ── HELPERS ───────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getTask = (sid,tid) => state.sections[sid]?.tasks.find(t=>t.id===tid);

function updateCount(secId) {
  const sec = state.sections[secId];
  const el = document.querySelector(`[data-sec-id="${secId}"] .section-count`);
  if (el) el.textContent = `${sec.tasks.filter(t=>t.done).length}/${sec.tasks.length}`;
}
function syncEmpty() {
  const list = document.getElementById('completed-list');
  if (!list) return;
  const items = list.querySelectorAll('.task-item');
  const empty = list.querySelector('.completed-empty');
  if (items.length===0 && !empty) list.innerHTML='<div class="completed-empty">No completed tasks yet.</div>';
  else if (items.length>0 && empty) empty.remove();
}

// ── SVG ICONS ─────────────────────────────────────────
const CHECKSVG = `<svg width="9" height="7" viewBox="0 0 9 7" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 3.5 3.2 5.5 8 1"/></svg>`;
const CHECKSM  = `<svg width="8" height="6" viewBox="0 0 8 6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 3 2.8 4.8 7 1"/></svg>`;
const EDITSVG  = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 9.5L3.5 9l5.8-5.8a1 1 0 0 0-1.5-1.5L2 7.5z"/></svg>`;
const DELSVG   = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>`;
const NOTESVG  = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="1.5" y="1.5" width="9" height="9" rx="2"/><line x1="3.5" y1="4.5" x2="8.5" y2="4.5"/><line x1="3.5" y1="7" x2="6.5" y2="7"/></svg>`;
const PLUSSVG  = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>`;
const CHEVSVG  = `<svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;

// ── BUILD SUBTASK LIST HTML ────────────────────────────
function buildSubsHTML(subs) {
  if (!subs.length) return '';
  return subs.map((s,i)=>`
    <div class="subtask-item" data-si="${i}">
      <div class="sub-cb ${s.done?'checked':''}" data-sact="tog" data-si="${i}">${CHECKSM}</div>
      <span class="sub-text ${s.done?'done':''}" contenteditable="true" spellcheck="false"
        data-sact="edit" data-si="${i}">${esc(s.text)}</span>
      <button class="sub-del" data-sact="del" data-si="${i}" title="Remove">${DELSVG}</button>
    </div>`).join('');
}

// ── WIRE EXPAND PANEL ─────────────────────────────────
function wireExpand(item, secId, taskId) {
  const task = getTask(secId, taskId);
  if (!task) return;

  // Note
  const noteEl = item.querySelector('.task-note');
  if (noteEl) {
    noteEl.addEventListener('input', ()=>{ task.note = noteEl.innerText; save(); });
    noteEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();noteEl.blur();} });
  }

  // Subtask interactions (event delegation)
  const subList = item.querySelector('.subtask-list');
  if (subList) {
    subList.addEventListener('click', e => {
      const el = e.target.closest('[data-sact]');
      if (!el) return;
      const act = el.dataset.sact;
      const si  = parseInt(el.dataset.si);
      if (isNaN(si)) return;

      if (act === 'tog') {
        task.subtasks[si].done = !task.subtasks[si].done;
        save();
        refreshSubList(item, secId, taskId);
      }
      if (act === 'del') {
        task.subtasks.splice(si, 1);
        save();
        refreshSubList(item, secId, taskId);
      }
    });

    // Inline subtask text editing
    subList.addEventListener('blur', e => {
      const el = e.target.closest('[data-sact="edit"]');
      if (!el) return;
      const si = parseInt(el.dataset.si);
      const val = el.innerText.trim();
      if (val) { task.subtasks[si].text = val; save(); }
      else { el.innerText = task.subtasks[si].text; }
    }, true);

    subList.addEventListener('keydown', e => {
      const el = e.target.closest('[data-sact="edit"]');
      if (el && e.key==='Enter') { e.preventDefault(); el.blur(); }
    });
  }

  // Add subtask
  const addInput = item.querySelector('.add-sub-input');
  const addBtn   = item.querySelector('.add-sub-btn');
  function doAdd() {
    const val = addInput?.value.trim();
    if (!val) return;
    task.subtasks.push({ text:val, done:false });
    save();
    addInput.value = '';
    refreshSubList(item, secId, taskId);
    item.querySelector('.add-sub-input')?.focus();
  }
  addInput?.addEventListener('keydown', e => { if(e.key==='Enter') doAdd(); });
  addBtn?.addEventListener('click', doAdd);
}

function refreshSubList(item, secId, taskId) {
  const task = getTask(secId, taskId);
  const subList = item.querySelector('.subtask-list');
  if (subList && task) {
    subList.innerHTML = buildSubsHTML(task.subtasks);
  }
}

// ── BUILD TASK ELEMENT ────────────────────────────────
function buildTaskEl(secId, task) {
  const item = document.createElement('div');
  item.className = 'task-item' + (task.done?' completed':'') + (task.expanded?' expanded':'');
  item.dataset.taskId = task.id;

  // Main row
  const mainRow = document.createElement('div');
  mainRow.className = 'task-main';
  mainRow.innerHTML = `
    <div class="task-checkbox ${task.done?'checked':''}" data-act="toggle">${CHECKSVG}</div>
    <span class="task-text" data-act="toggle-text">${esc(task.text)}</span>
    <div class="task-actions">
      <button class="task-btn ${task.expanded?'active':''}" data-act="expand" title="Notes & subtasks">${NOTESVG}</button>
      <button class="task-btn" data-act="edit" title="Edit">${EDITSVG}</button>
      <button class="task-btn danger" data-act="delete" title="Delete">${DELSVG}</button>
    </div>`;

  // Expand panel
  const expandPanel = document.createElement('div');
  expandPanel.className = 'task-expand';
  expandPanel.innerHTML = `
    <div>
      <div class="expand-label">Note</div>
      <div class="task-note" contenteditable="true" spellcheck="false"
        data-placeholder="Add a note…">${esc(task.note||'')}</div>
    </div>
    <div>
      <div class="expand-label">Subtasks</div>
      <div class="subtask-list">${buildSubsHTML(task.subtasks)}</div>
      <div class="add-sub-row">
        <input class="add-sub-input" type="text" placeholder="Add subtask… (Enter)">
        <button class="add-sub-btn" title="Add">${PLUSSVG}</button>
      </div>
    </div>`;

  item.appendChild(mainRow);
  item.appendChild(expandPanel);

  // Wire main row actions
  mainRow.addEventListener('click', e => {
    const act = e.target.closest('[data-act]')?.dataset.act;
    if (!act) return;
    if (act==='toggle' || act==='toggle-text') toggleTask(secId, task.id);
    if (act==='expand') toggleExpand(secId, task.id);
    if (act==='edit') startEdit(secId, task.id);
    if (act==='delete') deleteTask(secId, task.id);
  });

  mainRow.querySelector('[data-act="toggle-text"]').addEventListener('dblclick', e => {
    e.stopPropagation();
    startEdit(secId, task.id);
  });

  wireExpand(item, secId, task.id);
  return item;
}

// ── ACTIONS ───────────────────────────────────────────
function toggleExpand(secId, taskId) {
  const task = getTask(secId, taskId);
  if (!task) return;
  task.expanded = !task.expanded;
  save();
  const item = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!item) return;
  item.classList.toggle('expanded', task.expanded);
  const btn = item.querySelector('[data-act="expand"]');
  if (btn) btn.classList.toggle('active', task.expanded);
}

function toggleTask(secId, taskId) {
  const task = getTask(secId, taskId);
  if (!task) return;
  task.done = !task.done;
  task.expanded = false;
  save();

  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!el) return;
  el.classList.add('removing');

  setTimeout(() => {
    el.remove();
    if (task.done) {
      const list = document.getElementById('completed-list');
      if (list) {
        const empty = list.querySelector('.completed-empty');
        if (empty) empty.remove();
        list.insertBefore(buildTaskEl(secId, task), list.firstChild);
      }
    } else {
      const list = document.getElementById('tasklist-'+secId);
      if (list) list.insertBefore(buildTaskEl(secId, task), list.querySelector('.add-task-row'));
    }
    updateCount(secId);
    syncEmpty();
    updateProgress();
  }, 260);
}

function deleteTask(secId, taskId) {
  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!el) return;
  el.classList.add('removing');
  setTimeout(() => {
    state.sections[secId].tasks = state.sections[secId].tasks.filter(t=>t.id!==taskId);
    save();
    el.remove();
    updateCount(secId);
    syncEmpty();
    updateProgress();
  }, 260);
}

function addTask(secId) {
  const input = document.querySelector(`.add-task-input[data-sec="${secId}"]`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const task = defaultTask(secId+'_'+Date.now(), text);
  state.sections[secId].tasks.push(task);
  save();
  input.value = '';
  const list = document.getElementById('tasklist-'+secId);
  if (list) list.insertBefore(buildTaskEl(secId, task), list.querySelector('.add-task-row'));
  updateCount(secId);
  updateProgress();
}

function startEdit(secId, taskId) {
  const item = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!item || item.classList.contains('editing')) return;
  item.classList.add('editing');
  const task = getTask(secId, taskId);
  const textEl = item.querySelector('.task-text');
  if (!task || !textEl) return;

  const inp = document.createElement('input');
  inp.type='text'; inp.className='task-edit-input'; inp.value=task.text;
  textEl.replaceWith(inp);
  inp.focus(); inp.select();

  const commit = () => {
    const val = inp.value.trim();
    if (val) task.text = val;
    save();
    const span = document.createElement('span');
    span.className='task-text'; span.textContent=task.text;
    span.addEventListener('click', ()=>toggleTask(secId,taskId));
    span.addEventListener('dblclick', e=>{e.stopPropagation();startEdit(secId,taskId);});
    inp.replaceWith(span);
    item.classList.remove('editing');
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.value=task.text;inp.blur();}
  });
}

// ── RENDER ────────────────────────────────────────────
const mainEl = document.getElementById('main');

function renderSection(def) {
  const sec = state.sections[def.id];
  const done = sec.tasks.filter(t=>t.done).length;

  const wrap = document.createElement('div');
  wrap.className = 'section'+(sec.open?' open':'');
  wrap.dataset.secId = def.id;

  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = `
    <div class="section-left">
      <div class="section-dot"></div>
      <span class="section-title">${esc(def.title)}</span>
      <span class="section-count">${done}/${sec.tasks.length}</span>
    </div>${CHEVSVG}`;
  hdr.addEventListener('click', ()=>{
    sec.open=!sec.open; save();
    wrap.className='section'+(sec.open?' open':'');
  });

  const list = document.createElement('div');
  list.className='task-list';
  list.id='tasklist-'+def.id;

  // Only render non-done tasks in their section
  sec.tasks.filter(t=>!t.done).forEach(t=>list.appendChild(buildTaskEl(def.id,t)));

  const addRow = document.createElement('div');
  addRow.className='add-task-row';
  addRow.innerHTML=`
    <input class="add-task-input" type="text" placeholder="Add a task…" data-sec="${def.id}">
    <button class="add-task-btn" title="Add">${PLUSSVG}</button>`;
  addRow.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask(def.id);});
  addRow.querySelector('button').addEventListener('click',()=>addTask(def.id));
  list.appendChild(addRow);

  wrap.appendChild(hdr);
  wrap.appendChild(list);
  mainEl.appendChild(wrap);
}

function renderCompletedSection() {
  const wrap = document.createElement('div');
  wrap.className='completed-section';

  let open = true;
  const toggleSpan = document.createElement('span');
  toggleSpan.className='completed-toggle';
  toggleSpan.textContent='hide';

  const hdr = document.createElement('div');
  hdr.className='completed-header';
  hdr.innerHTML=`<span class="completed-label">Completed</span><div class="completed-line"></div>`;
  hdr.appendChild(toggleSpan);
  hdr.addEventListener('click',()=>{
    open=!open;
    list.style.display=open?'':'none';
    toggleSpan.textContent=open?'hide':'show';
  });

  const list = document.createElement('div');
  list.className='completed-list';
  list.id='completed-list';

  const allDone=[];
  Object.entries(state.sections).forEach(([sid,sec])=>
    sec.tasks.filter(t=>t.done).forEach(t=>allDone.push({sid,task:t})));

  if (!allDone.length) {
    list.innerHTML='<div class="completed-empty">No completed tasks yet.</div>';
  } else {
    allDone.forEach(({sid,task})=>list.appendChild(buildTaskEl(sid,task)));
  }

  wrap.appendChild(hdr);
  wrap.appendChild(list);
  mainEl.appendChild(wrap);
}

function renderAll() {
  mainEl.innerHTML='';
  SECTIONS_DATA.forEach(renderSection);
  renderCompletedSection();
  updateProgress();
}

// ── BOOT — load from Firebase first, then render ──────
(async () => {
  const remote = await loadFromFirebase();
  if (remote) state = migrateState(remote);
  renderAll();
})();
</script>
</body>
</html>
