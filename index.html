<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Operations</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a1a18'/%3E%3Crect x='7' y='9' width='11' height='1.8' rx='0.9' fill='%23b8975a'/%3E%3Crect x='7' y='13.6' width='8' height='1.8' rx='0.9' fill='%23b8975a' opacity='0.6'/%3E%3Crect x='7' y='18.2' width='9.5' height='1.8' rx='0.9' fill='%23b8975a' opacity='0.6'/%3E%3Crect x='7' y='22.8' width='6.5' height='1.8' rx='0.9' fill='%23b8975a' opacity='0.35'/%3E%3Ccircle cx='23' cy='9.9' r='2.5' fill='none' stroke='%23b8975a' stroke-width='1.5'/%3E%3Cpath d='M21.8 9.9l1 1 1.8-1.8' stroke='%23b8975a' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f4;
    --surface: #ffffff;
    --border: #e8e4de;
    --text-primary: #1a1a18;
    --text-secondary: #7a7670;
    --text-muted: #b0aca5;
    --gold: #b8975a;
    --gold-light: #e8d9be;
    --gold-subtle: #f5efe4;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.92);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    gap: 24px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--text-primary);
  }

  .brand-date {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    flex: 1;
    max-width: 320px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .progress-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .progress-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #d4aa6a);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* MAIN CONTENT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 32px 80px;
  }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow var(--transition);
  }

  .section:hover {
    box-shadow: var(--shadow-md);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color var(--transition), background var(--transition);
  }

  .section-header:hover {
    background: var(--gold-subtle);
  }

  .section.open .section-header {
    border-bottom-color: var(--border);
  }

  .section-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .section-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 0.01em;
    color: var(--text-primary);
  }

  .section-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--gold-subtle);
    border: 1px solid var(--gold-light);
    border-radius: 20px;
    padding: 2px 10px;
    font-weight: 500;
  }

  .section-chevron {
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    transition: transform var(--transition);
    flex-shrink: 0;
  }

  .section.open .section-chevron {
    transform: rotate(180deg);
  }

  /* TASK LIST */
  .task-list {
    display: none;
    padding: 8px 0;
  }

  .section.open .task-list {
    display: block;
    animation: slideDown 0.22s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* TASK ITEM */
  .task-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 24px;
    border-bottom: 1px solid var(--border);
    transition: background var(--transition), opacity var(--transition);
    group: task;
  }

  .task-item:last-child {
    border-bottom: none;
  }

  .task-item:hover {
    background: var(--gold-subtle);
  }

  .task-item.completed {
    opacity: 0.45;
  }

  /* CHECKBOX */
  .task-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition), transform 0.15s ease;
    background: transparent;
  }

  .task-item:hover .task-checkbox {
    border-color: var(--gold);
  }

  .task-checkbox.checked {
    background: var(--gold);
    border-color: var(--gold);
    transform: scale(0.95);
  }

  .task-checkbox svg {
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .task-checkbox.checked svg {
    opacity: 1;
  }

  .task-text {
    flex: 1;
    font-size: 13.5px;
    font-weight: 400;
    color: var(--text-primary);
    transition: color var(--transition);
    cursor: pointer;
  }

  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .task-delete {
    opacity: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: opacity var(--transition), background var(--transition), color var(--transition);
    flex-shrink: 0;
  }

  .task-item:hover .task-delete {
    opacity: 1;
  }

  .task-delete:hover {
    background: #fee2e2;
    color: #dc2626;
  }

  .task-edit {
    opacity: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: opacity var(--transition), background var(--transition), color var(--transition);
    flex-shrink: 0;
  }

  .task-item:hover .task-edit {
    opacity: 1;
  }

  .task-edit:hover {
    background: var(--gold-subtle);
    color: var(--gold);
  }

  .task-edit-input {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid var(--gold);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 400;
    color: var(--text-primary);
    outline: none;
    padding: 2px 4px;
    caret-color: var(--gold);
  }

  /* ADD TASK */
  .add-task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px 14px;
  }

  .add-task-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    outline: none;
    padding: 6px 0;
    border-bottom: 1px dashed var(--border);
    transition: border-color var(--transition), color var(--transition);
  }

  .add-task-input::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .add-task-input:focus {
    border-bottom-color: var(--gold);
    color: var(--text-primary);
  }

  .add-task-btn {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1.5px solid var(--gold-light);
    background: var(--gold-subtle);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    transition: background var(--transition), border-color var(--transition), transform 0.15s ease;
    flex-shrink: 0;
  }

  .add-task-btn:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
    transform: scale(1.05);
  }

  /* COMPLETED SECTION */
  .completed-section {
    margin-top: 28px;
  }

  .completed-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px 14px;
    cursor: pointer;
    user-select: none;
  }

  .completed-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .completed-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .completed-toggle {
    font-size: 10px;
    color: var(--text-muted);
    transition: color var(--transition);
  }

  .completed-header:hover .completed-toggle,
  .completed-header:hover .completed-label {
    color: var(--gold);
  }

  .completed-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .completed-empty {
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .header-inner { flex-wrap: wrap; height: auto; padding: 14px 0; gap: 12px; }
    .progress-wrap { max-width: 100%; width: 100%; }
    .main { padding: 24px 16px 60px; }
    .section-header { padding: 14px 18px; }
    .task-item { padding: 10px 18px; }
    .add-task-row { padding: 8px 18px 12px; }
    .site-header { padding: 0 16px; }
  }

  /* ANIMATIONS */
  .task-item {
    animation: fadeIn 0.25s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .removing {
    animation: fadeOut 0.28s ease forwards !important;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(12px); max-height: 0; padding-top: 0; padding-bottom: 0; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-name">Daily Operations</span>
      <span class="brand-date" id="today-date"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">Progress</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>
</header>

<main class="main" id="main"></main>

<script>
const SECTIONS_DATA = [
  {
    id: 'priority-immediate',
    title: 'Priority — Immediate',
    tasks: [
      'Rotter email',
      'Citizen 360 email',
      'Send Anna → Tom email',
      'Respond to Andrew Luf (attorney)',
      'Respond to Frank (Jay\'s team)',
      'RFC prep for 160 W 86th',
      'Prepare RFC documents for Jess deal',
      'Clarify Pulse + Happenings merge (confirm with MAG)',
      'Galina check-in',
      'Schedule extra access day for measurements',
      'Send Galina invoice for fee',
    ]
  },
  {
    id: 'high-priority',
    title: 'High Priority — Next 1–2 Days',
    tasks: [
      'Schedule Kevon (mover)',
      'Update Anna signature in Cloze',
      'Kelly rental search (UES ~$3K)',
      'Pam rental search (UES ~$3K)',
      'Check in with Kierstin (StreetEasy buyer)',
      'Add new contacts + emails into CRM',
    ]
  },
  {
    id: 'team-dev',
    title: 'Team Development',
    tasks: [
      'Increase Kierstin listing involvement',
      'Consider video tour for 15 W 84th',
      'Decide if Kierstin name goes on listing',
    ]
  },
  {
    id: 'recruiting',
    title: 'Recruiting',
    tasks: [
      'Text Lana to schedule coffee',
      'Discuss 2025 sales volume',
      'Confirm future business if hired',
    ]
  },
  {
    id: 'compliance',
    title: 'Compliance / Legal',
    tasks: [
      'Confirm FARE Act implications',
      'Verify tenant fee vs landlord fee structure',
      'Check with sales directors or legal',
    ]
  },
  {
    id: 'marketing',
    title: 'Marketing',
    tasks: [
      'Request ISO email template (with graphics)',
      'Closed postcard for Jess–Cappabianca',
      'Closed postcard for Rachel',
      'Possibly postcard for Kierstin',
    ]
  },
  {
    id: 'biz-dev',
    title: 'Team / Business Development',
    tasks: [
      'Book call with Tony Oakley',
      'Draft agenda for Tony meeting',
    ]
  },
  {
    id: 'admin',
    title: 'Admin / Back-End',
    tasks: [
      'Complete Kevin\'s past closings sheet',
    ]
  },
];

// ---- State ----
function getState() {
  try {
    const s = localStorage.getItem('ops_state');
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}

function buildDefaultState() {
  const state = { sections: {}, completed: [] };
  SECTIONS_DATA.forEach(sec => {
    state.sections[sec.id] = {
      open: true,
      tasks: sec.tasks.map((t, i) => ({ id: sec.id + '_' + i, text: t, done: false }))
    };
  });
  return state;
}

let state = getState() || buildDefaultState();

function saveState() {
  localStorage.setItem('ops_state', JSON.stringify(state));
}

// ---- Date ----
const dateEl = document.getElementById('today-date');
const now = new Date();
dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

// ---- Progress ----
function updateProgress() {
  let total = 0, done = 0;
  Object.values(state.sections).forEach(sec => {
    sec.tasks.forEach(t => { total++; if (t.done) done++; });
  });
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ---- Render ----
const main = document.getElementById('main');

function renderAll() {
  main.innerHTML = '';
  SECTIONS_DATA.forEach(secDef => {
    renderSection(secDef.id, secDef.title);
  });
  renderCompletedSection();
  updateProgress();
}

function renderSection(secId, title) {
  const secState = state.sections[secId];
  const wrap = document.createElement('div');
  wrap.className = 'section' + (secState.open ? ' open' : '');
  wrap.dataset.secId = secId;

  const doneCount = secState.tasks.filter(t => t.done).length;
  const total = secState.tasks.length;

  wrap.innerHTML = `
    <div class="section-header" onclick="toggleSection('${secId}')">
      <div class="section-left">
        <div class="section-dot"></div>
        <span class="section-title">${title}</span>
        <span class="section-count">${doneCount}/${total}</span>
      </div>
      <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="task-list" id="tasklist-${secId}"></div>
  `;

  main.appendChild(wrap);

  const list = wrap.querySelector(`#tasklist-${secId}`);
  secState.tasks.forEach(task => {
    list.appendChild(buildTaskEl(secId, task));
  });

  // Add task row
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.innerHTML = `
    <input class="add-task-input" type="text" placeholder="Add a task…" data-sec="${secId}">
    <button class="add-task-btn" onclick="addTask('${secId}')" title="Add task">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
      </svg>
    </button>
  `;
  addRow.querySelector('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask(secId);
  });
  list.appendChild(addRow);
}

function buildTaskEl(secId, task) {
  const item = document.createElement('div');
  item.className = 'task-item' + (task.done ? ' completed' : '');
  item.dataset.taskId = task.id;
  item.innerHTML = `
    <div class="task-checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask('${secId}','${task.id}')">
      <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 3.5 6.5 9 1"/>
      </svg>
    </div>
    <span class="task-text" onclick="toggleTask('${secId}','${task.id}')" ondblclick="startEdit('${secId}','${task.id}')">${escHtml(task.text)}</span>
    <button class="task-edit" onclick="startEdit('${secId}','${task.id}')" title="Edit task">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 9.5L3.5 9l5.8-5.8a1 1 0 0 0-1.5-1.5L2 7.5z"/>
      </svg>
    </button>
    <button class="task-delete" onclick="deleteTask('${secId}','${task.id}')" title="Remove">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/>
      </svg>
    </button>
  `;
  return item;
}

function renderCompletedSection() {
  const sec = document.createElement('div');
  sec.className = 'completed-section';
  sec.id = 'completed-section';
  sec.innerHTML = `
    <div class="completed-header" onclick="toggleCompleted()">
      <span class="completed-label">Completed</span>
      <div class="completed-line"></div>
      <span class="completed-toggle" id="completed-toggle">hide</span>
    </div>
    <div class="completed-list" id="completed-list"></div>
  `;
  main.appendChild(sec);
  renderCompleted();
}

let completedOpen = true;

function toggleCompleted() {
  completedOpen = !completedOpen;
  document.getElementById('completed-list').style.display = completedOpen ? '' : 'none';
  document.getElementById('completed-toggle').textContent = completedOpen ? 'hide' : 'show';
}

function renderCompleted() {
  const list = document.getElementById('completed-list');
  if (!list) return;
  list.innerHTML = '';
  const all = [];
  Object.entries(state.sections).forEach(([secId, sec]) => {
    sec.tasks.filter(t => t.done).forEach(t => all.push({ secId, task: t }));
  });
  if (all.length === 0) {
    list.innerHTML = '<div class="completed-empty">No completed tasks yet.</div>';
    return;
  }
  all.forEach(({ secId, task }) => {
    list.appendChild(buildTaskEl(secId, task));
  });
}

// ---- Actions ----
function toggleSection(secId) {
  state.sections[secId].open = !state.sections[secId].open;
  saveState();
  const wrap = document.querySelector(`[data-sec-id="${secId}"]`);
  if (wrap) wrap.className = 'section' + (state.sections[secId].open ? ' open' : '');
}

function toggleTask(secId, taskId) {
  const sec = state.sections[secId];
  const task = sec.tasks.find(t => t.id === taskId);
  if (!task) return;
  task.done = !task.done;
  saveState();

  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!el) return;

  // Animate out of current location
  el.classList.add('removing');

  setTimeout(() => {
    el.remove();

    if (task.done) {
      // Move into completed list
      const completedList = document.getElementById('completed-list');
      if (completedList) {
        const newEl = buildTaskEl(secId, task);
        newEl.style.animation = 'none';
        completedList.insertBefore(newEl, completedList.firstChild);
        // Trigger reflow then fade in
        newEl.offsetHeight;
        newEl.style.animation = '';
      }
    } else {
      // Move back into its original section list, before the add-task row
      const list = document.getElementById('tasklist-' + secId);
      if (list) {
        const addRow = list.querySelector('.add-task-row');
        const newEl = buildTaskEl(secId, task);
        list.insertBefore(newEl, addRow);
      }
    }

    // Update section count
    const doneCount = sec.tasks.filter(t => t.done).length;
    const total = sec.tasks.length;
    const countEl = document.querySelector(`[data-sec-id="${secId}"] .section-count`);
    if (countEl) countEl.textContent = `${doneCount}/${total}`;

    // Show empty state if completed list is now empty
    const completedList = document.getElementById('completed-list');
    if (completedList) {
      const items = completedList.querySelectorAll('.task-item');
      let emptyEl = completedList.querySelector('.completed-empty');
      if (items.length === 0 && !emptyEl) {
        completedList.innerHTML = '<div class="completed-empty">No completed tasks yet.</div>';
      } else if (items.length > 0 && emptyEl) {
        emptyEl.remove();
      }
    }

    updateProgress();
  }, 280);
}

function deleteTask(secId, taskId) {
  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (el) {
    el.classList.add('removing');
    setTimeout(() => {
      state.sections[secId].tasks = state.sections[secId].tasks.filter(t => t.id !== taskId);
      saveState();
      el.remove();
      const sec = state.sections[secId];
      const doneCount = sec.tasks.filter(t => t.done).length;
      const total = sec.tasks.length;
      const countEl = document.querySelector(`[data-sec-id="${secId}"] .section-count`);
      if (countEl) countEl.textContent = `${doneCount}/${total}`;
      // Show empty state in completed list if needed
      const completedList = document.getElementById('completed-list');
      if (completedList) {
        const items = completedList.querySelectorAll('.task-item');
        if (items.length === 0) {
          completedList.innerHTML = '<div class="completed-empty">No completed tasks yet.</div>';
        }
      }
      updateProgress();
    }, 280);
  }
}

function addTask(secId) {
  const input = document.querySelector(`.add-task-input[data-sec="${secId}"]`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const task = { id: secId + '_' + Date.now(), text, done: false };
  state.sections[secId].tasks.push(task);
  saveState();
  input.value = '';

  const list = document.getElementById('tasklist-' + secId);
  const addRow = list.querySelector('.add-task-row');
  list.insertBefore(buildTaskEl(secId, task), addRow);

  const sec = state.sections[secId];
  const doneCount = sec.tasks.filter(t => t.done).length;
  const total = sec.tasks.length;
  const countEl = document.querySelector(`[data-sec-id="${secId}"] .section-count`);
  if (countEl) countEl.textContent = `${doneCount}/${total}`;
  updateProgress();
}

function startEdit(secId, taskId) {
  const item = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!item || item.classList.contains('editing')) return;
  item.classList.add('editing');

  const textEl = item.querySelector('.task-text');
  const task = state.sections[secId].tasks.find(t => t.id === taskId);
  if (!task) return;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'task-edit-input';
  input.value = task.text;

  textEl.replaceWith(input);
  input.focus();
  input.select();

  function commit() {
    const val = input.value.trim();
    if (val && val !== task.text) {
      task.text = val;
      saveState();
    }
    // Re-build the span
    const span = document.createElement('span');
    span.className = 'task-text';
    span.textContent = task.text;
    span.onclick = () => toggleTask(secId, taskId);
    span.ondblclick = () => startEdit(secId, taskId);
    input.replaceWith(span);
    item.classList.remove('editing');
    if (completedOpen) renderCompleted();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = task.text; input.blur(); }
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Boot ----
renderAll();
</script>
</body>
</html>
